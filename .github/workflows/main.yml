name: Android Build

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Gradle
        run: |
          # 1. 소스 코드가 있는 폴더로 이동 (이 폴더 이름이 맞는지 확인하세요!)
          cd royal2
          
          # 2. gradlew 파일이 없으면 생성
          if [ ! -f gradlew ]; then
            echo "gradlew not found, generating wrapper..."
            gradle wrapper --gradle-version 8.5
          fi
          
          # 3. 권한 부여 및 빌드 실행
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: royal2/app/build/outputs/apk/debug/app-debug.apk
